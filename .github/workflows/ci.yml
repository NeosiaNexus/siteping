name: CI

on:
  pull_request:
    branches: [main]
  # Removed workflow_call — release.yml no longer calls CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test:run -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # E2E job intentionally removed from per-PR CI:
  # - Run time is ~16 min vs ~1.5 min for the rest of CI
  # - Tests are upstream-authored and don't cover our fork patches
  # - Failures historically did not block merges (no required check)
  # Manual local run still works via `bun run test:e2e`.
  # Re-introduce as a scheduled job if regressions appear.
